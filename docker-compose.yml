services:
  postgres:
    image: postgres:16-alpine
    container_name: schuldkompass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mj_money
      POSTGRES_USER: mj_money
      POSTGRES_PASSWORD: mj_money
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mj_money -d mj_money"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: schuldkompass-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  prometheus:
    image: prom/prometheus:latest
    container_name: schuldkompass-prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.7.0
    container_name: schuldkompass-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki

  alloy:
    image: grafana/alloy:latest
    container_name: schuldkompass-alloy
    restart: unless-stopped
    depends_on:
      - loki
    command: ["run", "/etc/alloy/config.alloy", "--storage.path=/var/lib/alloy/data"]
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data

  grafana:
    image: grafana/grafana-oss:latest
    container_name: schuldkompass-grafana
    restart: unless-stopped
    depends_on:
      - alloy
      - loki
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  alloy-data:
  grafana-data:
  loki-data:
  postgres-data:
  prometheus-data:
