name: schuldkompass

services:
  edge:
    image: marjun1988/mj-schulden-kompass-edge:${VERSION:-latest}
    container_name: schuldkompass-edge
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      docs:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ | grep -q 'SchuldKompass'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: marjun1988/mj-schulden-kompass-frontend:${VERSION:-latest}
    container_name: schuldkompass-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ | grep -q 'SchuldKompass'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  docs:
    image: marjun1988/mj-schulden-kompass-docs:${VERSION:-latest}
    container_name: schuldkompass-docs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ | grep -q 'SchuldKompass'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: marjun1988/mj-schulden-kompass-backend:${VERSION:-latest}
    container_name: schuldkompass-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required in production}"
      PORT: 4001
      METRICS_PORT: 9101
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required in production}"
      APP_URL: "${APP_URL:?APP_URL is required in production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      GITHUB_RELEASE_CHECK_ENABLED: "${GITHUB_RELEASE_CHECK_ENABLED:-true}"
      GITHUB_RELEASE_REPOSITORY: "${GITHUB_RELEASE_REPOSITORY:-MarJun1988/mj-schulden-kompass}"
      GITHUB_RELEASE_CHECK_TTL_MINUTES: "${GITHUB_RELEASE_CHECK_TTL_MINUTES:-360}"
      GITHUB_RELEASE_CHECK_TIMEOUT_MS: "${GITHUB_RELEASE_CHECK_TIMEOUT_MS:-3000}"
      MAIL_FROM: "${MAIL_FROM:?MAIL_FROM is required in production}"
      SMTP_HOST: "${SMTP_HOST:?SMTP_HOST is required in production}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:?SMTP_USER is required in production}"
      SMTP_PASS: "${SMTP_PASS:?SMTP_PASS is required in production}"
      SMTP_CONNECTION_TIMEOUT_MS: "${SMTP_CONNECTION_TIMEOUT_MS:-10000}"
      SMTP_GREETING_TIMEOUT_MS: "${SMTP_GREETING_TIMEOUT_MS:-10000}"
      SMTP_SOCKET_TIMEOUT_MS: "${SMTP_SOCKET_TIMEOUT_MS:-15000}"
      MAIL_RETRY_ENABLED: "${MAIL_RETRY_ENABLED:-true}"
      MAIL_RETRY_INTERVAL_MINUTES: "${MAIL_RETRY_INTERVAL_MINUTES:-5}"
      MAIL_RETRY_MAX_ATTEMPTS: "${MAIL_RETRY_MAX_ATTEMPTS:-10}"
      MAIL_RETRY_BATCH_SIZE: "${MAIL_RETRY_BATCH_SIZE:-20}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4001/graphql'',{method:''POST'',headers:{''content-type'':''application/json''},body:JSON.stringify({query:''query { __typename }''})}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: schuldkompass-prod-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-prod-data:/prometheus

  loki:
    image: grafana/loki:3.7.0
    container_name: schuldkompass-prod-loki
    profiles: ["monitoring"]
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-prod-data:/loki

  alloy:
    image: grafana/alloy:latest
    container_name: schuldkompass-prod-alloy
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      - loki
    command: ["run", "/etc/alloy/config.alloy", "--storage.path=/var/lib/alloy/data"]
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-prod-data:/var/lib/alloy/data

  grafana:
    image: grafana/grafana-oss:latest
    container_name: schuldkompass-prod-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      - alloy
      - loki
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required for monitoring}"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-prod-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro

  migrate:
    image: marjun1988/mj-schulden-kompass-backend:${VERSION:-latest}
    container_name: schuldkompass-migrate
    profiles: ["migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required in production}"
    command: ["sh", "-c", "cd backend && npx prisma migrate deploy"]

  postgres:
    image: postgres:16-alpine
    container_name: schuldkompass-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required in production}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required in production}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  alloy-prod-data:
  grafana-prod-data:
  loki-prod-data:
  postgres-prod-data:
  prometheus-prod-data:
