services:
  postgres:
    image: postgres:16-alpine
    container_name: schuldkompass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mj_money
      POSTGRES_USER: mj_money
      POSTGRES_PASSWORD: mj_money
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mj_money -d mj_money"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: schuldkompass-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
